# LLM + MCP-guided configuration for dummy_robot
# This file is intended for A/B testing against waiter_mission_checking.yaml.

node_name: "dummy_robot_bt_node"
orchestrator_type: "mcp"
package_name: "dummy_robot"

plugin_libraries:
  - "libdummy_bt_nodes_plugin.so"

bt_nodes_packages:
  - "dummy_bt_nodes"
bt_control_period_ms: 50
bt_timeout_sec: 60.0


# ── Mission definition ────────────────────────────────────────────────────────
save_exec: true
exec_dir: "/home/roi/UNI/robots/ros2/social_ws/exec"

mission_name: "restaurant_waiter_checking_mcp"
goal: "Take the customer's full order and deliver food to the kitchen chef and drink to the bar waiter"
context: |
  A service robot acting as a waiter in a restaurant.
  The robot starts at the service counter. There are 5 tables where customers are seated.
  The kitchen is at the back of the restaurant where the chef works.
  The bar is at the front of the restaurant where the human bar waiter serves drinks.
  The robot must just spin until it identifies a customer ready to order, approach their table, take their full order (first dish,
  second dish, and drink).
  Once the order is taken, the robot must check against a list of available items
  to ensure the required items are available to be served. If any item is unavailable, the robot must apologize and take a new order until all requested items are available.
  This new order will override the previous order in the robot's memory.
  Then, the robot must go to the kitchen to relay the food items to the chef, then go to the bar to relay the
  final drink to the human waiter.

useful_info: |
  Available food: pizza;steak;salad
  Available drinks: water;wine
  Available locations are:
    - main_kitchen
    - bar

preconditions:
  - "The plan must NOT assume that the customer is visible or detectable at the start. The robot should just spin until it identifies a customer ready to order if their location is unknown or not directly observable."
  - "To identify a customer ready to order, the robot may spin until it detects a person."
  - "The robot must explicitly navigate to the detected customer's location before attempting to speak with them."

postconditions:
  - "Order availability must be verified against the internal available-items list (useful_info), not by asking the customer whether items are available."
  - "When confirming the order with the customer, first confirm the food items, then confirm the drink, to ensure a clear and organized communication flow."
  - "When communicating with the chef in the kitchen, the robot must EXCLUSIVELY relay the food items (first dish, second dish) from the customer's order."
  - "When communicating with the bar waiter, the robot must EXCLUSIVELY relay the drink from the customer's order."
  - "To guarantee this strict isolation of information, the robot must capture and memorize the food selection and the drink selection as two entirely separate pieces of information right from the moment the customer speaks."
